AWSTemplateFormatVersion: "2010-09-09"
Description: Weekly Thing Archive Librarian API

Parameters:
  AllowedOrigin:
    Type: CommaDelimitedList
    Default: https://weekly.thingelstad.com,https://thingy.thingelstad.com,http://localhost:8080,http://127.0.0.1:8080
  CodeBucket:
    Type: String
    Description: S3 bucket containing the packaged Lambda code.
  CodeKey:
    Type: String
    Description: S3 key for the packaged Lambda code.
  StreamCodeKey:
    Type: String
    Description: S3 key for the packaged streaming Lambda code.
  CorpusBucket:
    Type: String
    Description: S3 bucket containing the embedded librarian corpus JSON.
  CorpusKey:
    Type: String
    Default: artifacts/corpus.json
  GraphKey:
    Type: String
    Default: artifacts/graph.json
  BlogCorpusKey:
    Type: String
    Default: artifacts/blog_corpus.json
    Description: >
      S3 key for the thingelstad.com blog corpus (separate from the Weekly
      Thing corpus). The stream Lambda lazy-loads it only when a request's
      scope includes blog, both, or all. Uploaded on its own cadence by
      pipeline/deploy/upload_blog_corpus.py, not the WT deploy.
  PodcastCorpusKey:
    Type: String
    Default: artifacts/podcast_corpus.json
    Description: >
      S3 key for the Another Thing podcast corpus. The stream Lambda
      lazy-loads it only when a request's scope includes podcast or all.
      Uploaded on its own cadence by pipeline/deploy/upload_podcast_corpus.py.
  ButtondownApiKey:
    Type: String
    NoEcho: true
  SessionSecret:
    Type: String
    NoEcho: true
  DiscordBridgeSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Shared secret for trusted Discord bridge calls, including web-account
      linking, role validation, Discord mention answers, and operator
      retrieval. Leave empty to disable bridge-only actions.
  DiscordConversationWebhookUrl:
    Type: String
    NoEcho: true
    Default: ""
    Description: >
      Optional Discord incoming webhook URL for Thingy conversation eval
      cards. When set, the background eval Lambda posts reviewed
      conversations directly to Discord and marks them posted.
  LogLevel:
    Type: String
    Default: INFO
    AllowedValues:
      - DEBUG
      - INFO
      - WARNING
      - ERROR
  AuthRateLimitMax:
    Type: Number
    Default: 30
    MinValue: 1
    Description: Maximum auth attempts per client identity per hour.
  FastmailJmapToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Fastmail JMAP API token used to send Thingy magic-link emails.
  ThingyMagicLinkFromEmail:
    Type: String
    Default: thingy@thingelstad.com
    Description: From address configured in Fastmail for Thingy magic-link emails.
  ThingyMagicLinkBaseUrl:
    Type: String
    Default: https://thingy.thingelstad.com/
    Description: Public Thingy URL used when building sign-in magic links.
Resources:
  LibrarianTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: project
          Value: Thingy

  LibrarianFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      Tags:
        - Key: project
          Value: Thingy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LibrarianDataAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource: !GetAtt LibrarianTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource: !GetAtt LibrarianTable.StreamArn
              - Effect: Allow
                Action: s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${CorpusBucket}/${CorpusKey}
                  - !Sub arn:aws:s3:::${CorpusBucket}/${GraphKey}
                  - !Sub arn:aws:s3:::${CorpusBucket}/${BlogCorpusKey}
                  - !Sub arn:aws:s3:::${CorpusBucket}/${PodcastCorpusKey}
                  - !Sub arn:aws:s3:::${CorpusBucket}/artifacts/dispatches/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${CorpusBucket}/artifacts/dispatches/*
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-sonnet-4-6
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-opus-4-6-v1
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-pro-v1:0
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-sonnet-4-6
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-opus-4-6-v1
                  - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-sonnet-4-6
                  - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
                  - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-opus-4-6-v1
                  - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-sonnet-4-6
                  - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
                  - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-opus-4-6-v1
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/cohere.embed-english-v3
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/cohere.rerank-v3-5:0
                  - arn:aws:bedrock:us-west-2::foundation-model/cohere.rerank-v3-5:0
                  - arn:aws:bedrock:ca-central-1::foundation-model/cohere.rerank-v3-5:0
                  - arn:aws:bedrock:eu-central-1::foundation-model/cohere.rerank-v3-5:0
                  - arn:aws:bedrock:ap-northeast-1::foundation-model/cohere.rerank-v3-5:0
              - Effect: Allow
                Action: bedrock:Rerank
                Resource: "*"

  LibrarianFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures:
        - arm64
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Join [",", !Ref AllowedOrigin]
          TABLE_NAME: !Ref LibrarianTable
          CORPUS_BUCKET: !Ref CorpusBucket
          CORPUS_KEY: !Ref CorpusKey
          GRAPH_KEY: !Ref GraphKey
          BUTTONDOWN_API_KEY: !Ref ButtondownApiKey
          SESSION_SECRET: !Ref SessionSecret
          DISCORD_BRIDGE_SECRET: !Ref DiscordBridgeSecret
          LOG_LEVEL: !Ref LogLevel
          AUTH_RATE_LIMIT_MAX: !Ref AuthRateLimitMax
          FASTMAIL_JMAP_TOKEN: !Ref FastmailJmapToken
          THINGY_MAGIC_LINK_FROM_EMAIL: !Ref ThingyMagicLinkFromEmail
          THINGY_MAGIC_LINK_BASE_URL: !Ref ThingyMagicLinkBaseUrl
          THINGY_DEFAULT_MODEL: "us.anthropic.claude-sonnet-4-6"
          THINGY_FAST_MODEL: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          THINGY_ADVANCED_MODEL: "us.anthropic.claude-opus-4-6-v1"
      Handler: auth/handler.handler
      MemorySize: 1024
      Role: !GetAtt LibrarianFunctionRole.Arn
      Runtime: nodejs20.x
      Timeout: 35
      Tags:
        - Key: project
          Value: Thingy

  LibrarianStreamFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures:
        - arm64
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref StreamCodeKey
      Environment:
        Variables:
          ALLOWED_ORIGIN: !Join [",", !Ref AllowedOrigin]
          TABLE_NAME: !Ref LibrarianTable
          CORPUS_BUCKET: !Ref CorpusBucket
          CORPUS_KEY: !Ref CorpusKey
          GRAPH_KEY: !Ref GraphKey
          BLOG_CORPUS_KEY: !Ref BlogCorpusKey
          PODCAST_CORPUS_KEY: !Ref PodcastCorpusKey
          SESSION_SECRET: !Ref SessionSecret
          DISCORD_BRIDGE_SECRET: !Ref DiscordBridgeSecret
          LOG_LEVEL: !Ref LogLevel
          THINGY_DEFAULT_MODEL: "us.anthropic.claude-sonnet-4-6"
          THINGY_FAST_MODEL: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          THINGY_ADVANCED_MODEL: "us.anthropic.claude-opus-4-6-v1"
          BEDROCK_EMBEDDING_MODEL: "cohere.embed-english-v3"
          BEDROCK_RERANK_MODEL: "cohere.rerank-v3-5:0"
          BEDROCK_RERANK_REGION: "us-west-2"
      Handler: chat/handler.handler
      MemorySize: 3008
      ReservedConcurrentExecutions: 5
      Role: !GetAtt LibrarianFunctionRole.Arn
      Runtime: nodejs20.x
      Timeout: 300
      Tags:
        - Key: project
          Value: Thingy

  LibrarianEvalFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures:
        - arm64
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          TABLE_NAME: !Ref LibrarianTable
          LOG_LEVEL: !Ref LogLevel
          THINGY_DEFAULT_MODEL: "us.anthropic.claude-sonnet-4-6"
          THINGY_FAST_MODEL: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          THINGY_ADVANCED_MODEL: "us.anthropic.claude-opus-4-6-v1"
          DISCORD_CONVERSATION_WEBHOOK_URL: !Ref DiscordConversationWebhookUrl
      Handler: eval/handler.handler
      MemorySize: 1024
      ReservedConcurrentExecutions: 1
      Role: !GetAtt LibrarianFunctionRole.Arn
      Runtime: nodejs20.x
      Timeout: 180
      Tags:
        - Key: project
          Value: Thingy

  LibrarianDispatchFunction:
    Type: AWS::Lambda::Function
    Properties:
      Architectures:
        - arm64
      Code:
        S3Bucket: !Ref CodeBucket
        S3Key: !Ref CodeKey
      Environment:
        Variables:
          TABLE_NAME: !Ref LibrarianTable
          CORPUS_BUCKET: !Ref CorpusBucket
          CORPUS_KEY: !Ref CorpusKey
          BLOG_CORPUS_KEY: !Ref BlogCorpusKey
          PODCAST_CORPUS_KEY: !Ref PodcastCorpusKey
          LOG_LEVEL: !Ref LogLevel
          THINGY_DEFAULT_MODEL: "us.anthropic.claude-sonnet-4-6"
          THINGY_FAST_MODEL: "us.anthropic.claude-haiku-4-5-20251001-v1:0"
          THINGY_ADVANCED_MODEL: "us.anthropic.claude-opus-4-6-v1"
          FASTMAIL_JMAP_TOKEN: !Ref FastmailJmapToken
          THINGY_MAGIC_LINK_FROM_EMAIL: !Ref ThingyMagicLinkFromEmail
          DISCORD_CONVERSATION_WEBHOOK_URL: !Ref DiscordConversationWebhookUrl
      Handler: dispatch/handler.handler
      MemorySize: 2048
      ReservedConcurrentExecutions: 1
      Role: !GetAtt LibrarianFunctionRole.Arn
      Runtime: nodejs20.x
      Timeout: 300
      Tags:
        - Key: project
          Value: Thingy

  LibrarianEvalEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt LibrarianTable.StreamArn
      FunctionName: !Ref LibrarianEvalFunction
      StartingPosition: LATEST
      BatchSize: 25
      MaximumBatchingWindowInSeconds: 30
      Enabled: true

  LibrarianDispatchEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt LibrarianTable.StreamArn
      FunctionName: !Ref LibrarianDispatchFunction
      StartingPosition: LATEST
      BatchSize: 5
      MaximumBatchingWindowInSeconds: 10
      Enabled: true
      FilterCriteria:
        Filters:
          - Pattern: '{"dynamodb":{"NewImage":{"item_type":{"S":["dispatch"]},"status":{"S":["queued","ready_to_send"]}}}}'

  LibrarianStreamFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      Cors:
        AllowHeaders:
          - content-type
          - authorization
        AllowMethods:
          - GET
          - POST
        AllowOrigins: !Ref AllowedOrigin
      InvokeMode: RESPONSE_STREAM
      TargetFunctionArn: !Ref LibrarianStreamFunction

  LibrarianStreamInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref LibrarianStreamFunction
      FunctionUrlAuthType: NONE
      Principal: "*"

  LibrarianStreamInvokeFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LibrarianStreamFunction
      InvokedViaFunctionUrl: true
      Principal: "*"

  LibrarianApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: weekly-thing-librarian
      ProtocolType: HTTP
      Tags:
        project: Thingy
      CorsConfiguration:
        AllowHeaders:
          - content-type
          - authorization
        AllowMethods:
          - GET
          - OPTIONS
          - POST
        AllowOrigins: !Ref AllowedOrigin

  LibrarianIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref LibrarianApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LibrarianFunction.Arn
      PayloadFormatVersion: "2.0"

  AuthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref LibrarianApi
      RouteKey: POST /auth
      Target: !Sub integrations/${LibrarianIntegration}

  ConversationsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref LibrarianApi
      RouteKey: POST /conversations
      Target: !Sub integrations/${LibrarianIntegration}

  DispatchRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref LibrarianApi
      RouteKey: POST /dispatch
      Target: !Sub integrations/${LibrarianIntegration}

  HealthRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref LibrarianApi
      RouteKey: GET /health
      Target: !Sub integrations/${LibrarianIntegration}

  LibrarianStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref LibrarianApi
      StageName: $default
      AutoDeploy: true
      Tags:
        project: Thingy

  LibrarianInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref LibrarianFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${LibrarianApi}/*/*/*

  LibrarianAuthErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Thingy auth Lambda has errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LibrarianFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: project
          Value: Thingy

  LibrarianStreamErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Thingy stream Lambda has errors.
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LibrarianStreamFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: project
          Value: Thingy

  LibrarianStreamThrottlesAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Thingy stream Lambda is throttling.
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref LibrarianStreamFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Tags:
        - Key: project
          Value: Thingy

  BedrockEvaluationRole:
    Type: AWS::IAM::Role
    Properties:
      Tags:
        - Key: project
          Value: Thingy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ThingyBedrockEvaluationAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${CorpusBucket}/eval/datasets/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  - !Sub arn:aws:s3:::${CorpusBucket}/eval/runs/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${CorpusBucket}
                Condition:
                  StringLike:
                    s3:prefix:
                      - eval/datasets/*
                      - eval/runs/*
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                Resource:
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-sonnet-4-6
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-haiku-4-5-20251001-v1:0
                  - !Sub arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.anthropic.claude-opus-4-6-v1
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-pro-v1:0
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-sonnet-4-6
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
                  - !Sub arn:aws:bedrock:${AWS::Region}::foundation-model/anthropic.claude-opus-4-6-v1
                  - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-sonnet-4-6
                  - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
                  - arn:aws:bedrock:us-east-2::foundation-model/anthropic.claude-opus-4-6-v1
                  - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-sonnet-4-6
                  - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-haiku-4-5-20251001-v1:0
                  - arn:aws:bedrock:us-west-2::foundation-model/anthropic.claude-opus-4-6-v1

  LibrarianDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: weekly-thing-librarian
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Thingy Lambda invocations and errors",
                "metrics": [
                  [ "AWS/Lambda", "Invocations", "FunctionName", "${LibrarianFunction}" ],
                  [ ".", "Errors", ".", "." ],
                  [ ".", "Invocations", "FunctionName", "${LibrarianStreamFunction}" ],
                  [ ".", "Errors", ".", "." ]
                ],
                "stat": "Sum",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "region": "${AWS::Region}",
                "title": "Thingy Lambda duration",
                "metrics": [
                  [ "AWS/Lambda", "Duration", "FunctionName", "${LibrarianFunction}" ],
                  [ ".", ".", ".", "${LibrarianStreamFunction}" ]
                ],
                "stat": "Average",
                "period": 300
              }
            }
          ]
        }

Outputs:
  LibrarianApiUrl:
    Description: Base URL for the Archive Librarian API.
    Value: !Sub https://${LibrarianApi}.execute-api.${AWS::Region}.amazonaws.com
  LibrarianStreamUrl:
    Description: Streaming URL for the Archive Librarian chat API.
    Value: !GetAtt LibrarianStreamFunctionUrl.FunctionUrl
  BedrockEvalRoleArn:
    Description: IAM role ARN used by on-demand Bedrock Model Evaluation jobs.
    Value: !GetAtt BedrockEvaluationRole.Arn
