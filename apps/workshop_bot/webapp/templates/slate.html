{% extends "base.html" %}
{% set nav = "slate" %}
{% block title %}Slate{% endblock %}
{% block content %}
  <h1>Scout · production slate</h1>
  <p class="muted">What's in flight across each surface — the same view as <code>/scout slate</code>,
  read-only. <span class="badge">live</span></p>
  <div class="card">
    {% for r in rows %}
      <div style="padding:.15rem 0; {{ 'padding-left:1.25rem; color:#444;' if r.child else 'font-weight:600; margin-top:.5rem;' }}">{{ r.html|safe }}</div>
    {% endfor %}
  </div>
{% endblock %}
