<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Studio{% endblock %} · Workshop</title>
  <style>
    :root { --ink:#1b1b1f; --soft:#6b6b76; --rule:#e6e6ea; --accent:#3b5bdb; --bg:#fafafb; --chip:#eef1fb; }
    * { box-sizing: border-box; }
    body { font: 16px/1.55 -apple-system, system-ui, sans-serif; color: var(--ink); background: var(--bg); margin: 0; }
    header.top { position: sticky; top: 0; background: #fff; border-bottom: 1px solid var(--rule);
                 padding: .6rem 1rem; display: flex; gap: .25rem 1rem; align-items: center; flex-wrap: wrap; }
    header.top .brand { font-weight: 700; letter-spacing: -.01em; margin-right: .5rem; }
    header.top a { color: var(--ink); text-decoration: none; padding: .35rem .6rem; border-radius: 7px; font-size: .95rem; }
    header.top a.active, header.top a:hover { background: var(--chip); }
    header.top a.soon { color: #aaa; pointer-events: none; }
    header.top .sp { flex: 1; }
    header.top .who { color: var(--soft); font-size: .85rem; }
    main { max-width: 46rem; margin: 1.5rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; margin: .2rem 0 1rem; }
    .muted { color: var(--soft); }
    .card { background: #fff; border: 1px solid var(--rule); border-radius: 12px; padding: 1rem 1.1rem; }
    .badge { display: inline-block; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em;
             background: var(--chip); color: var(--accent); padding: .15rem .5rem; border-radius: 999px; }
    code { background: #f0f0f3; padding: .08rem .35rem; border-radius: 4px; font-size: .92em; }
    .row { display: flex; gap: .6rem; align-items: baseline; padding: .4rem 0; border-top: 1px solid var(--rule); }
    .row:first-child { border-top: 0; }
    .row .id { font-weight: 600; min-width: 5rem; }
    .row .ph { font-size: .72rem; text-transform: uppercase; letter-spacing: .05em; color: var(--accent);
               background: var(--chip); padding: .1rem .45rem; border-radius: 999px; }
    .row .ti { flex: 1; }
    .row .due { color: var(--soft); font-size: .85rem; }
    .row.done .id, .row.done .ti { color: var(--soft); }
    .secthead { display: flex; align-items: baseline; gap: .5rem; margin: 1.4rem 0 .3rem; }
    .secthead h2 { font-size: 1.05rem; margin: 0; }
    .secthead .surface { color: var(--soft); font-size: .8rem; }
    a.btn, button.btn { display: inline-block; background: var(--accent); color: #fff; border: 0;
            padding: .45rem .8rem; border-radius: 8px; font-size: .9rem; text-decoration: none; cursor: pointer; }
    a.btn.ghost { background: var(--chip); color: var(--accent); }
    form.pform label { display: block; margin: .9rem 0 .25rem; font-weight: 600; font-size: .9rem; }
    form.pform input, form.pform select, form.pform textarea { width: 100%; padding: .5rem .6rem;
            border: 1px solid var(--rule); border-radius: 8px; font: inherit; background: #fff; }
    form.pform .hint { color: var(--soft); font-size: .8rem; margin-top: .2rem; }
    .err { background: #fdecea; border: 1px solid #f5c6c2; color: #8a1f17; padding: .6rem .8rem;
           border-radius: 8px; margin-bottom: 1rem; }
    .actions { margin-top: 1.3rem; display: flex; gap: .6rem; align-items: center; }
    .chatlog { max-height: 22rem; overflow-y: auto; display: flex; flex-direction: column; gap: .5rem; padding-bottom: .6rem; }
    .chatmsg { padding: .45rem .65rem; border-radius: 9px; font-size: .92rem; max-width: 90%; }
    .chatmsg strong { color: var(--accent); margin-right: .3rem; }
    .chatmsg.me { background: var(--chip); align-self: flex-end; }
    .chatmsg.agent { background: #f4f4f6; align-self: flex-start; }
  </style>
</head>
<body>
  <header class="top">
    <span class="brand">Studio</span>
    <a href="/" class="{{ 'active' if nav=='slate' else '' }}">Slate</a>
    <a href="/seeds" class="{{ 'active' if nav=='seeds' else '' }}">Seeds</a>
    <a href="/productions" class="{{ 'active' if nav=='productions' else '' }}">Productions</a>
    <span class="sp"></span>
    <span class="who">{{ login }}</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
