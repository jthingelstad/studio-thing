{# Reusable Eddy chat panel. Set `chat_key` before including. #}
<div class="secthead"><h2>Ask Eddy</h2><span class="surface">secondary</span></div>
<section class="panel">
  <div id="chatlog" class="chatlog"></div>
  <form id="chatform" class="row">
    <div class="field-inline">
      <select id="chatpersona" title="Who to address">
        <option value="eddy">Eddy</option>
      </select>
      <input id="chatmsg" placeholder="Ask Eddy..." autocomplete="off">
      <button class="btn" type="submit">Send</button>
    </div>
  </form>
</section>
<script>
(function(){
  const key = {{ chat_key|tojson }};
  const log = document.getElementById('chatlog');
  let since = 0;
  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function render(m){
    const who = m.role === 'user' ? 'you' : (m.persona || 'studio');
    const div = document.createElement('div');
    div.className = 'chatmsg ' + (m.role === 'user' ? 'me' : 'agent');
    div.innerHTML = '<strong>' + esc(who) + '</strong> ' + esc(m.content);
    log.appendChild(div); log.scrollTop = log.scrollHeight;
  }
  async function poll(){
    try{
      const r = await fetch('/chat?context_key=' + encodeURIComponent(key) + '&since=' + since);
      const j = await r.json();
      for(const m of (j.messages||[])){ render(m); since = Math.max(since, m.id); }
    }catch(e){}
  }
  document.getElementById('chatform').addEventListener('submit', async function(e){
    e.preventDefault();
    const inp = document.getElementById('chatmsg'); const msg = inp.value.trim();
    if(!msg) return; inp.value = '';
    const fd = new FormData();
    fd.append('context_key', key); fd.append('message', msg);
    fd.append('persona', document.getElementById('chatpersona').value);
    try { await fetch('/chat', {method:'POST', body: fd}); } catch(e){}
    poll();
  });
  poll(); setInterval(poll, 2500);
})();
</script>
