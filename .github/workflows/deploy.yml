name: Studio — Production & Handoff

# Studio owns production. This workflow builds archive/site inputs from the
# canonical sources, updates the Librarian runtime artifacts, and hands the
# generated 11ty inputs to weekly.thingelstad.com, which only renders + deploys.
# Pushes to main commit the handoff automatically. Manual runs default to a
# dry-run diff unless push_to_weekly is checked.

on:
  push:
    branches: [main]
    paths:
      - 'data/issues/**'
      - 'data/audio/**'
      - 'data/blog/**'
      - 'data/podcast/**'
      - 'pipeline/**'
      - 'librarian-core/**'
      - 'apps/librarian/**'
      - '.github/workflows/deploy.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:
    inputs:
      push_to_weekly:
        description: 'Commit generated inputs to the website repo'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: studio-production
  cancel-in-progress: false

jobs:
  produce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/librarian/lambda/package-lock.json

      - run: uv sync --locked
      - run: echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"

      - name: Lint
        run: uv run --locked ruff check .

      - name: Install Lambda dependencies
        run: npm --prefix apps/librarian/lambda ci

      - name: Detect changed production surfaces
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual production runs are intentionally full refreshes.
            echo "weekly_corpus=true" >> "$GITHUB_OUTPUT"
            echo "blog_corpus=true" >> "$GITHUB_OUTPUT"
            echo "podcast_corpus=true" >> "$GITHUB_OUTPUT"
            echo "site_handoff=true" >> "$GITHUB_OUTPUT"
            echo "lambda=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="HEAD~1"
          fi
          if ! changed="$(git diff --name-only "$base" HEAD)"; then
            echo "Could not diff against $base; falling back to HEAD commit files."
            changed="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          fi
          printf '%s\n' "$changed"

          has_change() {
            local pattern
            for pattern in "$@"; do
              if grep -Eq "$pattern" <<< "$changed"; then
                return 0
              fi
            done
            return 1
          }

          shared_corpus=false
          if has_change \
            '^pyproject\.toml$' \
            '^uv\.lock$' \
            '^librarian-core/' \
            '^pipeline/deploy/upload_corpus\.py$'; then
            shared_corpus=true
          fi

          weekly_corpus=false
          if [[ "$shared_corpus" == "true" ]] || has_change \
            '^data/issues/' \
            '^data/audio/' \
            '^pipeline/content/' \
            '^pipeline/corpus/build\.py$' \
            '^pipeline/graph/' \
            '^pipeline/deploy/upload_corpus\.py$'; then
            weekly_corpus=true
          fi

          blog_corpus=false
          if [[ "$shared_corpus" == "true" ]] || has_change \
            '^data/blog/' \
            '^pipeline/blog/' \
            '^pipeline/deploy/upload_blog_corpus\.py$'; then
            blog_corpus=true
          fi

          podcast_corpus=false
          if [[ "$shared_corpus" == "true" ]] || has_change \
            '^data/podcast/' \
            '^pipeline/podcast/' \
            '^pipeline/corpus/build_podcast\.py$' \
            '^pipeline/deploy/upload_podcast_corpus\.py$'; then
            podcast_corpus=true
          fi

          site_handoff=false
          if has_change \
            '^data/issues/' \
            '^data/audio/' \
            '^pipeline/content/' \
            '^pipeline/graph/' \
            '^pipeline/deploy/push_site_inputs\.py$'; then
            site_handoff=true
          fi

          lambda=false
          if has_change \
            '^apps/librarian/' \
            '^pipeline/deploy/aws\.py$'; then
            lambda=true
          fi

          echo "weekly_corpus=$weekly_corpus" >> "$GITHUB_OUTPUT"
          echo "blog_corpus=$blog_corpus" >> "$GITHUB_OUTPUT"
          echo "podcast_corpus=$podcast_corpus" >> "$GITHUB_OUTPUT"
          echo "site_handoff=$site_handoff" >> "$GITHUB_OUTPUT"
          echo "lambda=$lambda" >> "$GITHUB_OUTPUT"

      # Materialize apps/site/archive/{N}.md + _data/emails.json from the
      # canonical data/issues/{N}/ store. Runs before tests because
      # test_audio_script reads archive files as fixtures, and apps/site/ is a
      # transient build artifact in Studio (built here, not committed).
      - name: Build archive from data/issues/
        run: python pipeline/content/content.py build

      - name: Run Python tests
        run: python -m unittest discover -s tests -p 'test_*.py' -t .

      - name: Run Lambda tests
        run: npm --prefix apps/librarian/lambda test

      # Note: landing-page stats (subscriber/supporter numbers) are NOT produced
      # here — weekly fetches its own in its CI. Studio no longer refreshes or
      # hands off stats.json.

      - name: Build Weekly Thing corpus
        if: steps.changes.outputs.weekly_corpus == 'true'
        run: python pipeline/corpus/build.py

      - name: Build podcast corpus
        if: steps.changes.outputs.podcast_corpus == 'true'
        run: python pipeline/corpus/build_podcast.py

      # data/librarian/graph.json powers the site's topic pages.
      - name: Build graph for site topics
        if: steps.changes.outputs.weekly_corpus == 'true' || steps.changes.outputs.site_handoff == 'true'
        run: python pipeline/graph/build.py

      # Embed every corpus the Librarian API can load. Each upload reuses
      # cached embeddings from the previous S3 artifact when chunk ids match.
      # continue-on-error so a Bedrock hiccup doesn't block the website handoff.
      - name: Upload embedded Weekly Thing corpus + graph to S3
        if: steps.changes.outputs.weekly_corpus == 'true'
        continue-on-error: true
        run: python pipeline/deploy/upload_corpus.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          LIBRARIAN_BUCKET: weekly-thing-librarian

      - name: Upload embedded blog corpus to S3
        if: steps.changes.outputs.blog_corpus == 'true'
        continue-on-error: true
        run: python pipeline/deploy/upload_blog_corpus.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          LIBRARIAN_BUCKET: weekly-thing-librarian

      - name: Upload embedded podcast corpus to S3
        if: steps.changes.outputs.podcast_corpus == 'true'
        continue-on-error: true
        run: python pipeline/deploy/upload_podcast_corpus.py
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          LIBRARIAN_BUCKET: weekly-thing-librarian

      - name: Detect Lambda changes
        id: lambda-changes
        run: |
          echo "changed=${{ steps.changes.outputs.lambda }}" >> "$GITHUB_OUTPUT"

      - name: Deploy Thingy Lambda
        if: steps.lambda-changes.outputs.changed == 'true'
        continue-on-error: true
        run: python pipeline/deploy/aws.py --skip-corpus-upload --skip-smoke-test
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          LIBRARIAN_BUCKET: weekly-thing-librarian
          LIBRARIAN_BRIDGE_SECRET: ${{ secrets.LIBRARIAN_BRIDGE_SECRET }}
          LIBRARIAN_SESSION_SECRET: ${{ secrets.LIBRARIAN_SESSION_SECRET }}

      # Powers /ops/ and /status.json on the site. Reads S3 for the deployed
      # corpus timestamp; non-fatal if S3 fails.
      - name: Generate pipeline status report
        continue-on-error: true
        run: python pipeline/status.py --json apps/site/_data/status.json
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          LIBRARIAN_BUCKET: weekly-thing-librarian

      # Handoff. Ships the generated 11ty inputs to the website repo as one
      # atomic commit on normal pushes. Manual runs are dry-run by default for
      # inspection, unless push_to_weekly is checked.
      - name: Hand off site inputs to the website repo
        if: steps.changes.outputs.site_handoff == 'true'
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.push_to_weekly }}" == "true" ]]; then
            echo "Committing site inputs to the website repo."
            python pipeline/deploy/push_site_inputs.py --push
          else
            echo "Manual dry-run diff only (set push_to_weekly = true to commit)."
            python pipeline/deploy/push_site_inputs.py
          fi
        env:
          GITHUB_PAT_TOKEN: ${{ secrets.STUDIO_PAT_TOKEN }}
          GITHUB_REPO_NWO: jthingelstad/weekly.thingelstad.com
