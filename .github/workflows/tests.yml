name: tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --locked
      - name: Lint
        run: uv run --locked ruff check .
      - name: Format
        run: uv run --locked ruff format --check .
      - name: Audit locked dependencies
        run: |
          uv export --locked --no-dev --no-emit-project --format requirements-txt > /tmp/requirements.txt
          sed -i '/^-e \.\/librarian-core$/d' /tmp/requirements.txt
          uvx --from pip-audit==2.10.1 pip-audit --requirement /tmp/requirements.txt --disable-pip
      - name: Tests
        run: uv run --locked pytest tests/ apps/workshop_bot/tests/ -q

  lambda:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/librarian/lambda
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/librarian/lambda/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
